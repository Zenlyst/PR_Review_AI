apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pr-review-ai.fullname" . }}
  labels:
    {{- include "pr-review-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  GITHUB_APP_ID: {{ .Values.secrets.githubAppId | quote }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.secrets.githubWebhookSecret | quote }}
  DATABASE_URL: {{ include "pr-review-ai.databaseUrl" . | quote }}
data:
  # PEM key — must be provided base64-encoded
  github-private-key.pem: {{ .Values.secrets.githubPrivateKey | b64enc | quote }}
