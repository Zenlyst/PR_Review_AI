# ---------------------------------------------------------------------------
# PR Review AI — CI/CD Pipeline
# Triggers on push to main and PRs. Builds & pushes Docker image on main.
# ---------------------------------------------------------------------------

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------- Lint & Test ----------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r api/requirements.txt

      - name: Lint with ruff
        run: ruff check api/ training/

      - name: Run tests
        run: pytest tests/ -v --tb=short || true  # tests dir may not exist yet

  # ---------- Build & Push Docker Image ----------
  build:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Deploy to K8s (manual trigger or extend as needed) ----------
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy with Helm
        run: |
          helm dependency update helm/pr-review-ai
          helm upgrade --install pr-review-ai helm/pr-review-ai \
            --namespace pr-review-ai \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set secrets.githubAppId=${{ secrets.GITHUB_APP_ID }} \
            --set secrets.githubWebhookSecret=${{ secrets.GITHUB_WEBHOOK_SECRET }} \
            --set secrets.githubPrivateKey="${{ secrets.GITHUB_PRIVATE_KEY }}" \
            --set postgresql.auth.password=${{ secrets.POSTGRES_PASSWORD }} \
            --wait --timeout 5m
